# Loomis: tune default gitleaks rules (false positives only).
# Run locally: gitleaks detect --verbose --redact --source .

title = "Loomis"

[extend]
useDefault = true

[allowlist]
description = "False positives: UI prefs key + local model trees (never commit models/)."
regexes = [
  # localStorage key for app shell prefs — not a credential
  '''^loomis\.ui\.prefs\.v1$''',
]
paths = [
  # OpenVINO IR/tokenizer XML under models/ triggers generic-api-key on version attrs; models/ is gitignored.
  '''(^|[\\/])models([\\/]|$)''',
]
