name: Deploy AcouLM Website

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Intentionally no npm cache config to avoid lockfile-path errors.

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        working-directory: site
        env:
          # GitHub sets CI=true; some npm versions pair that with omitting devDependencies.
          # Vite, TypeScript, and @vitejs/plugin-react are devDependencies but required to build.
          NODE_ENV: development
        run: |
          npm ci
          test -d node_modules/react-router-dom
          test -d node_modules/vite
          test -d node_modules/typescript

      - name: Build site
        working-directory: site
        env:
          NODE_ENV: production
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
